services:
  app:
    build: ./app
    container_name: nbio-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/app.db
      BABY_NAME: ${BABY_NAME:-Baby}
      TZ: ${TZ:-Europe/London}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  backup:
    build: ./backup
    container_name: nbio-backup
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./data:/data:ro
      - ./data/backups:/backups
      - ./data/rclone:/config
    environment:
      RCLONE_REMOTE: ${RCLONE_REMOTE:-gdrive}
      RETAIN_LOCAL: ${RETAIN_LOCAL:-7}
      RETAIN_REMOTE_DAYS: ${RETAIN_REMOTE_DAYS:-30}
      TZ: ${TZ:-Europe/London}
