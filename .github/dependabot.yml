version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-prod:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "jinja2"
          - "pydantic*"
        update-types: ["patch", "minor"]
      python-dev:
        dependency-type: development
        update-types: ["patch", "minor"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
        # Group only safe bumps; majors land alone so a single CI failure
        # points at a single action. See issue #25.
        update-types: ["patch", "minor"]

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /backup
    schedule:
      interval: weekly
