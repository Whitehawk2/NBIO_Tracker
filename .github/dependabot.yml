version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-prod:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "jinja2"
          - "pydantic*"
      python-dev:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /backup
    schedule:
      interval: weekly
