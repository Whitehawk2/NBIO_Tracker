<div class="tile-wrap">
  <button class="tile tile-breast" data-type="breast" aria-label="Log breast feed">
    <div class="tile-head">
      <span class="emoji" aria-hidden="true">🤱</span>
      <span class="label">BREAST</span>
    </div>
    <div class="tile-ago" id="ago-breast">
      {% if today.last.breast %}
        <span data-rel="{{ today.last.breast.occurred_at }}">{{ today.last.breast.occurred_at | relative }}</span>
        {% if today.last.breast.actor_color %}
          <span class="actor-dot" style="background: {{ today.last.breast.actor_color }}" title="{{ today.last.breast.actor_name or '' }}"></span>
        {% endif %}
      {% else %}
        <span class="no-recent">no recent</span>
      {% endif %}
    </div>
  </button>
  <div class="tile-hint" data-hint="long-press" hidden>
    <span>Hold 3s to log instantly</span>
    <button type="button" class="hint-dismiss" aria-label="Dismiss hint">×</button>
  </div>
</div>
