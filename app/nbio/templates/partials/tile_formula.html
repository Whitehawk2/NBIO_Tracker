<button class="tile tile-formula" data-type="formula" aria-label="Log formula feed">
  <div class="tile-head">
    <span class="emoji" aria-hidden="true">🍼</span>
    <span class="label">FORMULA</span>
  </div>
  <div class="tile-ago" id="ago-formula">
    {% if today.last.feed and today.last.feed.type == 'formula' %}
      <span data-rel="{{ today.last.feed.occurred_at }}">{{ today.last.feed.occurred_at | relative }}</span>
      {% if today.last.feed.formula_brand %}
        <span class="muted"> · {{ today.last.feed.formula_brand }}</span>
      {% endif %}
      {% if today.last.feed.actor_color %}
        <span class="actor-dot" style="background: {{ today.last.feed.actor_color }}" title="{{ today.last.feed.actor_name or '' }}"></span>
      {% endif %}
    {% else %}
      <span class="muted">no recent</span>
    {% endif %}
  </div>
</button>
