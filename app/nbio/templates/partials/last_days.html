<section class="last-days" aria-label="Last 3 days">
  <h2 class="section-title">Last 3 days</h2>
  <table class="last-days-table">
    <thead>
      <tr>
        <th class="day-col"></th>
        <th><span aria-hidden="true">🤱</span> feeds</th>
        <th><span aria-hidden="true">🍼</span> cc</th>
        <th><span aria-hidden="true">💦</span> wees</th>
        <th><span aria-hidden="true">💩</span> poos</th>
      </tr>
    </thead>
    <tbody>
      {% for row in last_days %}
        <tr data-day="{{ row.day }}">
          <td class="day-col">{{ row.label }}</td>
          <td data-col="feed">{{ row.feed }}</td>
          <td data-col="formula_ml">{{ row.formula_ml }}</td>
          <td data-col="wee">{{ row.wee }}</td>
          <td data-col="poo">{{ row.poo }}{% if row.poo == 0 %} <span class="hint" title="no poo logged that day">·</span>{% endif %}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
